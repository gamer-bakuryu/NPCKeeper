<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPCKeeper — Gerador de NPCs para Call of Cthulhu 7e</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="app">

    <header class="app-header">
        <div class="header-brand">
            <h1 class="app-title">☽ NPCKeeper</h1>
            <p class="app-subtitle">Gerador de NPCs — Call of Cthulhu 7th Edition</p>
        </div>
        <nav class="header-nav">
            <button id="btn-new-npc" class="btn btn-primary">Novo NPC</button>
            <button id="btn-generate-all" class="btn btn-accent">Gerar Tudo</button>
            <button id="btn-load-npc" class="btn btn-ghost">Carregar JSON</button>
            <button id="btn-saved-list" class="btn btn-ghost">Salvos</button>
        </nav>
    </header>

    <main class="main-content">

        <!-- ========== SEÇÃO: IDENTIDADE ========== -->
        <section class="form-section" id="section-identity">
            <div class="section-header">
                <h2>Identidade</h2>
            </div>
            <div class="section-body">
                <div class="identity-grid">
                    <div class="portrait-area">
                        <div class="portrait-frame" id="portrait-frame">
                            <div class="portrait-placeholder" id="portrait-placeholder">
                                <span class="portrait-icon">👤</span>
                                <span class="portrait-text">Clique para enviar foto</span>
                                <span class="portrait-hint">512×512 recomendado</span>
                            </div>
                            <img id="portrait-img" class="portrait-img hidden" alt="Retrato do NPC">
                            <input type="file" id="portrait-input" accept="image/*" hidden>
                        </div>
                        <button id="btn-remove-portrait" class="btn btn-ghost btn-tiny hidden">Remover foto</button>
                    </div>
                    <div class="identity-fields">
                        <div class="input-row">
                            <div class="input-group flex-2">
                                <label for="npc-name">Nome</label>
                                <div class="input-with-btn">
                                    <input type="text" id="npc-name" class="input-field" placeholder="Nome do NPC">
                                    <button class="btn btn-ghost btn-tiny btn-gen" data-generate="name" title="Gerar nome">⚄</button>
                                </div>
                            </div>
                            <div class="input-group flex-1">
                                <label for="npc-age">Idade</label>
                                <div class="input-with-btn">
                                    <input type="number" id="npc-age" class="input-field" min="1" max="120" placeholder="—">
                                    <button class="btn btn-ghost btn-tiny btn-gen" data-generate="age" title="Gerar idade">⚄</button>
                                </div>
                            </div>
                        </div>
                        <div class="input-row">
                            <div class="input-group flex-1">
                                <label for="npc-sex">Sexo</label>
                                <select id="npc-sex" class="input-field">
                                    <option value="">— Opcional —</option>
                                    <option value="Masculino">Masculino</option>
                                    <option value="Feminino">Feminino</option>
                                    <option value="Outro">Outro</option>
                                </select>
                            </div>
                            <div class="input-group flex-2">
                                <label for="npc-occupation">Profissão</label>
                                <select id="npc-occupation" class="input-field">
                                    <option value="">— Selecione —</option>
                                </select>
                            </div>
                        </div>
                        <div class="input-group">
                            <label for="npc-role">Papel Narrativo</label>
                            <select id="npc-role" class="input-field">
                                <option value="">— Selecione —</option>
                                <option value="Testemunha">Testemunha</option>
                                <option value="Suspeito">Suspeito</option>
                                <option value="Aliado">Aliado</option>
                                <option value="Antagonista">Antagonista</option>
                                <option value="Cultista">Cultista</option>
                                <option value="Investigador">Investigador</option>
                                <option value="Sobrevivente">Sobrevivente</option>
                                <option value="Civil">Civil</option>
                                <option value="Contato">Contato</option>
                                <option value="Familiar">Familiar</option>
                                <option value="Vítima">Vítima</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- ========== SEÇÃO: NARRATIVA ========== -->
        <section class="form-section" id="section-narrative">
            <div class="section-header">
                <h2>Narrativa</h2>
                <button class="btn btn-ghost btn-tiny btn-gen" data-generate="narrative" title="Gerar narrativa">⚄ Gerar</button>
            </div>
            <div class="section-body">
                <div class="input-group">
                    <label for="npc-objective">Objetivo</label>
                    <div class="input-with-btn">
                        <input type="text" id="npc-objective" class="input-field" placeholder="O que move este personagem?">
                        <button class="btn btn-ghost btn-tiny btn-gen" data-generate="objective" title="Gerar objetivo">⚄</button>
                    </div>
                </div>
                <div class="input-group">
                    <label for="npc-secret">Segredo</label>
                    <div class="input-with-btn">
                        <input type="text" id="npc-secret" class="input-field" placeholder="O que este NPC esconde?">
                        <button class="btn btn-ghost btn-tiny btn-gen" data-generate="secret" title="Gerar segredo">⚄</button>
                    </div>
                </div>
                <div class="input-group">
                    <label for="npc-connection">Ligação com o Caso</label>
                    <div class="input-with-btn">
                        <input type="text" id="npc-connection" class="input-field" placeholder="Por que este NPC importa para a investigação?">
                        <button class="btn btn-ghost btn-tiny btn-gen" data-generate="connection" title="Gerar ligação">⚄</button>
                    </div>
                </div>
                <div class="input-group">
                    <label>Personalidade</label>
                    <div class="personality-tags" id="personality-tags">
                        <!-- Gerado dinamicamente -->
                    </div>
                    <div class="personality-selected" id="personality-selected">
                        <!-- Tags selecionadas -->
                    </div>
                    <button class="btn btn-ghost btn-tiny btn-gen" data-generate="personality" title="Gerar personalidade" style="margin-top:var(--space-sm)">⚄ Gerar Personalidade</button>
                </div>
            </div>
        </section>

        <!-- ========== SEÇÃO: ATRIBUTOS ========== -->
        <section class="form-section" id="section-attributes">
            <div class="section-header">
                <h2>Atributos</h2>
                <button class="btn btn-ghost btn-tiny btn-gen" data-generate="attributes" title="Gerar atributos">⚄ Gerar</button>
            </div>
            <div class="section-body">
                <div class="attributes-grid" id="attributes-grid">
                    <!-- Gerado dinamicamente -->
                </div>
                <div class="derived-stats" id="derived-stats">
                    <!-- HP, MP, SAN, Esquiva, etc. -->
                </div>
            </div>
        </section>

        <!-- ========== SEÇÃO: PERÍCIAS ========== -->
        <section class="form-section" id="section-skills">
            <div class="section-header">
                <h2>Perícias</h2>
                <div class="section-header-actions">
                    <button class="btn btn-ghost btn-tiny btn-gen" data-generate="skills" title="Gerar perícias">⚄ Gerar por Profissão</button>
                    <button class="btn btn-ghost btn-tiny" id="btn-toggle-all-skills">Mostrar Todas</button>
                </div>
            </div>
            <div class="section-body">
                <div class="skills-container" id="skills-container">
                    <!-- Gerado dinamicamente -->
                </div>
            </div>
        </section>

        <!-- ========== SEÇÃO: COMBATE ========== -->
        <section class="form-section" id="section-combat">
            <div class="section-header">
                <h2>Combate</h2>
                <button class="btn btn-ghost btn-tiny" id="btn-add-weapon">+ Arma</button>
            </div>
            <div class="section-body">
                <div class="weapons-list" id="weapons-list">
                    <p class="empty-msg">Nenhuma arma adicionada.</p>
                </div>
            </div>
        </section>

        <!-- ========== SEÇÃO: RELAÇÕES ========== -->
        <section class="form-section" id="section-relations">
            <div class="section-header">
                <h2>Relações</h2>
                <button class="btn btn-ghost btn-tiny" id="btn-add-relation">+ Relação</button>
            </div>
            <div class="section-body">
                <div class="relations-list" id="relations-list">
                    <p class="empty-msg">Nenhuma relação adicionada.</p>
                </div>
            </div>
        </section>

        <!-- ========== SEÇÃO: NOTAS ========== -->
        <section class="form-section" id="section-notes">
            <div class="section-header">
                <h2>Notas</h2>
            </div>
            <div class="section-body">
                <textarea id="npc-notes" class="input-field textarea-field" rows="4" placeholder="Observações livres sobre o NPC..."></textarea>
            </div>
        </section>

        <!-- ========== AÇÕES FINAIS ========== -->
        <section class="form-actions">
            <button id="btn-save-local" class="btn btn-primary btn-large">Salvar Localmente</button>
            <button id="btn-export-json" class="btn btn-accent btn-large">Exportar JSON (CallKeeper)</button>
            <button id="btn-delete-npc" class="btn btn-danger btn-large hidden">Excluir NPC</button>
        </section>

    </main>

</div>

<!-- MODAL -->
<div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal-container" class="modal-container">
        <div class="modal-header">
            <h3 id="modal-title">—</h3>
            <button id="modal-close" class="btn btn-ghost btn-tiny">✕</button>
        </div>
        <div id="modal-body" class="modal-body"></div>
        <div id="modal-footer" class="modal-footer"></div>
    </div>
</div>

<!-- INPUT OCULTO PARA CARREGAR JSON -->
<input type="file" id="json-load-input" accept=".json" hidden>

<!-- SCRIPTS -->
<script src="js/data/names.js"></script>
<script src="js/data/occupations.js"></script>
<script src="js/data/personality.js"></script>
<script src="js/data/generators.js"></script>
<script src="js/models/NPC.js"></script>
<script src="js/managers/NPCManager.js"></script>
<script src="js/ui/Modal.js"></script>
<script src="js/ui/FormUI.js"></script>
<script src="js/ui/AttributesUI.js"></script>
<script src="js/ui/SkillsUI.js"></script>
<script src="js/ui/ExportUI.js"></script>
<script src="js/app.js"></script>

</body>
</html>
